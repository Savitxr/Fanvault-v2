# ─────────────────────────────────────────────────────────────────────────────
# fanvault-frontend — Nginx Static File Server Configuration
# Place at: /etc/nginx/sites-available/fanvault
# Enable with: ln -s /etc/nginx/sites-available/fanvault \
#                    /etc/nginx/sites-enabled/fanvault
#
# ── ROUTING ARCHITECTURE NOTE ────────────────────────────────────────────────
# ALL path-based API routing is handled by the AWS Application Load Balancer.
#
# ALB Listener Rules (configured in AWS Console):
#   /api/auth/*     → fanvault-identity-tg  (Identity Service EC2 :3001)
#   /api/users/*    → fanvault-identity-tg  (Identity Service EC2 :3001)
#   /api/products/* → fanvault-commerce-tg  (Commerce Service EC2 :3002)
#   /api/orders/*   → fanvault-commerce-tg  (Commerce Service EC2 :3002)
#   /*  (default)   → fanvault-frontend-tg  (THIS Nginx — static files only)
#
# Nginx on this instance is a PURE STATIC FILE SERVER.
# It does NOT proxy any API traffic. Do not add proxy_pass rules here.
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream Backends ────────────────────────────────────────────────────────
# API routing is handled locally on this monolithic instance.
#
upstream fanvault_identity {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream fanvault_commerce {
    server 127.0.0.1:3002;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # ── Static Assets Root ────────────────────────────────────────────────────
    root  /var/www/fanvault-frontend/dist;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript
        application/xml+rss application/atom+xml
        image/svg+xml;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Cache Static Assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API Routes ────────────────────────────────────────────────────────────
    # API routing is handled locally. Nginx proxies requests to the respective
    # backend service running on the local loopback interface.

    location /api/auth/ {
        proxy_pass         http://fanvault_identity;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /api/users/ {
        proxy_pass         http://fanvault_identity;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /api/products/ {
        proxy_pass         http://fanvault_commerce;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /api/orders/ {
        proxy_pass         http://fanvault_commerce;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── Health check endpoint (for ALB target group health probes) ────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"fanvault-frontend"}';
        add_header Content-Type application/json;
    }

    # ── React SPA catch-all (must be last) ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
